<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="920" height="500" fill="#f0f0eb"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">LIDAR-Lite v3  →  Arduino Uno  (PWM Mode)</text>

  <!-- ══════════════════════════════════════════
       LIDAR-LITE v3 BODY
  ══════════════════════════════════════════ -->
  <rect x="30" y="60" width="185" height="320" rx="10" fill="#1a3f80" stroke="#0d2550" stroke-width="2.5"/>
  <text x="122" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="white">LIDAR-Lite v3</text>
  <text x="122" y="100" text-anchor="middle" font-size="10" fill="#90b0ff">Garmin</text>

  <!-- Lens detail -->
  <circle cx="122" cy="205" r="45" fill="#0a1830" stroke="#2060b0" stroke-width="2"/>
  <circle cx="122" cy="205" r="32" fill="#050f20" stroke="#1040a0" stroke-width="1.5"/>
  <circle cx="108" cy="205" r="10" fill="#081828" stroke="#2060a0" stroke-width="1"/>
  <circle cx="136" cy="205" r="10" fill="#081828" stroke="#2060a0" stroke-width="1"/>
  <circle cx="122" cy="205" r="5" fill="#0a2040"/>

  <!-- 6-pin connector block on right side of sensor -->
  <rect x="203" y="105" width="18" height="230" rx="4" fill="#b08800" stroke="#806000" stroke-width="1.5"/>

  <!-- Pin solder pads -->
  <circle cx="221" cy="130" r="6" fill="#ffd700" stroke="#b08800" stroke-width="1.5"/>
  <circle cx="221" cy="168" r="6" fill="#ffd700" stroke="#b08800" stroke-width="1.5"/>
  <circle cx="221" cy="206" r="6" fill="#ffd700" stroke="#b08800" stroke-width="1.5"/>
  <circle cx="221" cy="244" r="6" fill="#888"    stroke="#555"    stroke-width="1.5"/>
  <circle cx="221" cy="282" r="6" fill="#888"    stroke="#555"    stroke-width="1.5"/>
  <circle cx="221" cy="320" r="6" fill="#ffd700" stroke="#b08800" stroke-width="1.5"/>

  <!-- Pin labels (inside sensor body) -->
  <text x="198" y="134" text-anchor="end" font-size="11" fill="#c0d8ff">1 · 5V</text>
  <text x="198" y="172" text-anchor="end" font-size="11" fill="#c0d8ff">2 · GND</text>
  <text x="198" y="210" text-anchor="end" font-size="11" fill="#c0d8ff">3 · Mode</text>
  <text x="198" y="248" text-anchor="end" font-size="11" fill="#777">4 · SCL</text>
  <text x="198" y="286" text-anchor="end" font-size="11" fill="#777">5 · SDA</text>
  <text x="198" y="324" text-anchor="end" font-size="11" fill="#c0d8ff">6 · PWM</text>


  <!-- ══════════════════════════════════════════
       ARDUINO UNO BODY
  ══════════════════════════════════════════ -->
  <rect x="640" y="55" width="250" height="370" rx="10" fill="#1d7a7a" stroke="#0d5555" stroke-width="2.5"/>
  <text x="765" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Arduino Uno</text>

  <!-- USB port -->
  <rect x="640" y="190" width="22" height="55" rx="3" fill="#999" stroke="#555" stroke-width="1.5"/>
  <text x="651" y="248" text-anchor="middle" font-size="8" fill="white" transform="rotate(-90,651,222)">USB</text>

  <!-- ATmega chip -->
  <rect x="700" y="200" width="75" height="55" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <text x="737" y="231" text-anchor="middle" font-size="9" fill="#bbb">ATmega</text>
  <text x="737" y="244" text-anchor="middle" font-size="9" fill="#bbb">328P</text>

  <!-- Pin header strip (left side of Arduino board, facing the sensor) -->
  <rect x="662" y="100" width="14" height="300" rx="3" fill="#222" stroke="#111" stroke-width="1"/>

  <!-- Pin pads on left edge -->
  <circle cx="662" cy="130" r="6" fill="#ffd700" stroke="#b08800" stroke-width="1.5"/>
  <circle cx="662" cy="168" r="6" fill="#ffd700" stroke="#b08800" stroke-width="1.5"/>
  <circle cx="662" cy="206" r="6" fill="#ffd700" stroke="#b08800" stroke-width="1.5"/>
  <circle cx="662" cy="320" r="6" fill="#ffd700" stroke="#b08800" stroke-width="1.5"/>
  <circle cx="662" cy="358" r="6" fill="#ffd700" stroke="#b08800" stroke-width="1.5"/>

  <!-- Pin labels (inside Arduino body) -->
  <text x="682" y="134" font-size="11" fill="white">5V</text>
  <text x="682" y="172" font-size="11" fill="white">GND</text>
  <text x="682" y="210" font-size="11" fill="white">GND  ← cap</text>
  <text x="682" y="324" font-size="11" fill="white">D2  (PWM in)</text>
  <text x="682" y="362" font-size="11" fill="white">D3  (trigger)</text>


  <!-- ══════════════════════════════════════════
       WIRES
  ══════════════════════════════════════════ -->

  <!-- 5V  (red): Pin 1 → Arduino 5V -->
  <polyline points="227,130 420,130 420,130 662,130"
            fill="none" stroke="#cc0000" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- GND (black): Pin 2 → Arduino GND -->
  <polyline points="227,168 430,168 430,168 662,168"
            fill="none" stroke="#222" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Mode (orange): Pin 3 → D3 — routes below to avoid crossing -->
  <polyline points="227,206 370,206 370,358 662,358"
            fill="none" stroke="#e06000" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- SCL  N/C -->
  <line x1="227" y1="244" x2="278" y2="244" stroke="#aaa" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="284" y="248" font-size="10" fill="#888">N/C</text>

  <!-- SDA  N/C -->
  <line x1="227" y1="282" x2="278" y2="282" stroke="#aaa" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="284" y="286" font-size="10" fill="#888">N/C</text>

  <!-- PWM  (yellow): Pin 6 → D2 -->
  <polyline points="227,320 380,320 380,320 662,320"
            fill="none" stroke="#b8a000" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>


  <!-- ══════════════════════════════════════════
       DECOUPLING CAPACITOR  (between 5V & GND wires)
  ══════════════════════════════════════════ -->

  <!-- Drop from 5V wire -->
  <line x1="450" y1="130" x2="450" y2="145" stroke="#cc0000" stroke-width="3"/>
  <!-- Top plate -->
  <line x1="430" y1="145" x2="470" y2="145" stroke="#333" stroke-width="3.5"/>
  <!-- Bottom plate (curved = electrolytic +) -->
  <line x1="430" y1="157" x2="470" y2="157" stroke="#333" stroke-width="3.5"/>
  <!-- Rise to GND wire -->
  <line x1="450" y1="157" x2="450" y2="168" stroke="#222" stroke-width="3"/>

  <!-- + symbol on capacitor top -->
  <text x="476" y="150" font-size="12" font-weight="bold" fill="#cc0000">+</text>

  <!-- Capacitor label -->
  <rect x="420" y="167" width="80" height="26" rx="4" fill="white" opacity="0.85"/>
  <text x="460" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">680µF</text>
  <text x="460" y="190" text-anchor="middle" font-size="9" fill="#666">electrolytic</text>

  <!-- wire label callouts -->
  <text x="540" y="122" text-anchor="middle" font-size="10" fill="#cc0000" font-weight="bold">5V</text>
  <text x="540" y="160" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">GND</text>
  <text x="310" y="350" text-anchor="middle" font-size="10" fill="#e06000" font-weight="bold">Trigger</text>
  <text x="540" y="312" text-anchor="middle" font-size="10" fill="#b8a000" font-weight="bold">PWM out</text>


  <!-- ══════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════ -->
  <rect x="30" y="410" width="860" height="76" rx="8" fill="white" stroke="#ccc" stroke-width="1.5" opacity="0.9"/>
  <text x="50" y="430" font-size="12" font-weight="bold" fill="#333">Legend</text>

  <!-- red -->
  <line x1="105" y1="430" x2="145" y2="430" stroke="#cc0000" stroke-width="3"/>
  <circle cx="105" cy="430" r="3" fill="#cc0000"/>
  <circle cx="145" cy="430" r="3" fill="#cc0000"/>
  <text x="150" y="434" font-size="11" fill="#333">5V power</text>

  <!-- black -->
  <line x1="105" y1="455" x2="145" y2="455" stroke="#222" stroke-width="3"/>
  <circle cx="105" cy="455" r="3" fill="#222"/>
  <circle cx="145" cy="455" r="3" fill="#222"/>
  <text x="150" y="459" font-size="11" fill="#333">GND</text>

  <!-- orange -->
  <line x1="265" y1="430" x2="305" y2="430" stroke="#e06000" stroke-width="3"/>
  <circle cx="265" cy="430" r="3" fill="#e06000"/>
  <circle cx="305" cy="430" r="3" fill="#e06000"/>
  <text x="310" y="434" font-size="11" fill="#333">Trigger — Pin 3 → D3</text>

  <!-- yellow -->
  <line x1="265" y1="455" x2="305" y2="455" stroke="#b8a000" stroke-width="3"/>
  <circle cx="265" cy="455" r="3" fill="#b8a000"/>
  <circle cx="305" cy="455" r="3" fill="#b8a000"/>
  <text x="310" y="459" font-size="11" fill="#333">PWM out — Pin 6 → D2</text>

  <!-- N/C -->
  <line x1="530" y1="430" x2="570" y2="430" stroke="#aaa" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="575" y="434" font-size="11" fill="#777">Not connected (SCL / SDA)</text>

  <!-- cap note -->
  <text x="530" y="459" font-size="11" fill="#555">⊣⊢  680µF electrolytic cap: + to 5V, − to GND  (mount close to sensor)</text>

</svg>
